<!DOCTYPE html>
<html lang="en">
<head>
    <title>함수</title>

    <style>
        .area{
            width: 500px;
            height: 200px;
            border: 1px solid tomato;
            background-color: salmon;
        }
    </style>
</head>
<body>
    <h1>함수(function)</h1>

    <!--
        함수의 목적

        1. 코드의 재사용(의미를 달아두고 싶음)
        2. 이벤트핸들러
    -->

    <h3 onclick="firstFn();">선언적 함수</h3>

    <pre onclick="firstFn();">
        function 이라는 키워드를 이용하여 함수를 선언

        function 함수식별자(매개변수){
            함수 호출 시 수행할 코드;

            return 결과값;
        }
        - 매개변수, return은 생략 가능
    </pre>

    <div id="area1" class="area" onclick="firstFn();"></div>

    <script>
        function firstFn(){
            document.querySelector('#area1').innerHTML = '함수호출';
        }
    </script>

    <hr>

    <h3>* 익명함수</h3>

    <pre>
        변수/속성 = () => {
            이벤트가 발생했을 때 수행할 코드;
        }
    </pre>

    <button id="btn">버튼</button>
    <div id="area2" class="area"></div>

    <script>
        const btnEl = document.querySelector('#btn');

        btnEl.onclick = () => {
            // 버튼을 클릭했을 때 수행하고 싶은 코드를
            // 버튼요소에 클릭 이벤트가 발생했을 때 동작시킬 코드 뭉치
            // ==> 이벤트 핸들러
            document.querySelector('#area2').innerHTML = '함수호출';
        };
    </script>

    <hr>

    <h3>함수의 매개변수</h3>

    <!--button[onclick="paramFn();"]*6-->
    <button onclick="paramFn('문자열');">문자열</button>
    <button onclick="paramFn(123);">숫자</button>
    <button onclick="paramFn([1, 2, 3]);">배열</button>
    <button onclick="paramFn('호잇');">펑션</button>
    <!-- 인자값의 자료형은 함수 호출 시 아무런 영향을 끼치지 않는다 -->

    <button onclick="paramFn();">X</button>
    <!-- 실행에는 영향을 끼치지 않음 / 단, undefined가 대입 -->

    <button onclick="paramFn(1, 2);">많이</button>
    <!-- 인자의 개수도 실행에는 영향을 끼치지 않음 / 단, 초과된 값은 사람짐 -->

    <div id="area3" class="area"></div>

    <button onclick="paramFn(paramFn(1, 12, 45, 76, 43, 23, 66, 75, 82))">1번</button>
    <button onclick="paramFn(paramFn(12, 34, 56 ,67, 87, 93, 90, 32, 44, 65))">2번</button>

    <script>
        function paramFn(value){
            // console.log(value);
            // document.querySelector('#area3').innerHTML = value;
            console.log(arguments);
            // 함수 호출 시 전달하는 인자값은 내부적으로 arguments라는 배열현태로 담김

            console.log(value);
        }
    </script>

    <hr>

    <button onclick="color(this);" id="btn1">123</button><br>
    <button onclick="color(this);" id="btn2">123</button>

    <script>
        function changeColor1(){
            document.querySelector('#btn1').style.color = 'red';
        }
        function changeColor2(){
            document.querySelector('#btn2').style.color = 'red';
        }

        function changeColor(value){
            if(value === 1){ 
                document.querySelector('#btn1').style.color = 'red';
            } else{
                document.querySelector('#btn2').style.color = 'red';
            }
        }

        function change(value){
            document.querySelector(`btn${value}`).style.color = 'red';
        }

        function color(value){
            // console.log(value);
            value.style.color = 'red';
        }
    </script>

    <hr>

    <h3>함수의 반환</h3>

    <button onclick="random(prompt('이름을 입력하세요'));">반환받기</button>
    <div id="area6" class="area"></div>

    <script>
        function random(name){
            const fn = generateNum();

            // 클로저(Closure) : 외부 함수 실행이 끝나더라도
            // 반환받은 내부 함수를 이용해서 외부 함수 내 변수를 사용하는 기술
            document.querySelector('#area6').innerHTML = fn(name);
        }

        function generateNum(){
            const num = parseInt(Math.random() * 10) + 1;

            return function generateNum(name){
                return `${name}님의 랜덤한 숫자 : ${num}`;
            }
        }
    </script>

    <hr>

    <h3>옛날코드를 보면 볼 수도 있는 코드</h3>

    <button onclick="testFn()();">호출</button>

    <script>
        function testFn(){
            return function(){
                alert('asdf');
            };
        }
    </script>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
