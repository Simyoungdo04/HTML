<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(44, 39, 46);
            color: rgb(223, 223, 223);
        }

        *{
            margin: 0;
            padding: 0;
        }
        div{
            box-sizing: border-box;
        }
        #wrap{
            width: 1200px;
            height: 800px;
            margin: auto;
        }
        .board{
            width: 280px;
            padding: 8px;
            padding-bottom: 10px;
            display: inline-block;
            border-radius: 5px;

            &:hover{
                box-shadow: 1px 2px 6px rgb(181, 168, 211);
                transition: 100ms;
                width: 285px;
            }
        } 
        
        .board img{
            width: 100%;
            border-radius: 5px;
        } 
        .board h2{
            font-weight: 600;
        } 
        .board p{
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="wrap"></div>
    <button onclick="movieList();">영화 목록</button>

    <script>
        function movieList(){
            const movies = [
                {
                    "image" : "https://img.megabox.co.kr/SharedImg/2026/04/22/Z7tourFOyU0a3xThKHzRJ3gYi24XHaGu_420.jpg",
                    "movieNo" : "1",
                    "title" : "악마는 프라다를 입는다 2"
                },{
                    "image" : "https://img.megabox.co.kr/SharedImg/2026/03/26/ZYNrYfmeXYfoEQsycZ0qsznq2mOPPO1q_420.jpg",
                    "movieNo" : "2",
                    "title" : "슈퍼 마리오 갤럭시"
                },{
                    "image" : "https://img.megabox.co.kr/SharedImg/2026/04/02/YXo8ougumTWQ6x9oEGJkHqoFpdrvXV6I_420.jpg",
                    "movieNo" : "3",
                    "title" : "살목지"
                },{
                    "image" : "https://img.megabox.co.kr/SharedImg/2026/04/23/GDb9ynfc8wRTUbdPcZ77HPbGTejLcyJ2_420.jpg",
                    "movieNo" : "4",
                    "title" : "짱구"
                }
            ];
            console.log(movies);
            
            const list = movies.map(m => `<div class="board">
                                            <image src=${m.image} />
                                            <h2>${m.movieNo}</h2>
                                            <p>${m.title}</p>
                                          </div>`).join('');
            document.querySelector('#wrap').innerHTML = list;
        }
    </script>

</body>
</html>
