    <h3>배열에 요소를 추가하는 방법</h3>

    <button onclick="addEl();">버튼</button>

    <div id="area2" class="area small"></div>

    <script>
        function addEl(){
            const array1 = [];           // 빈 배열을 선언한는 방법 / 권장방법
            const array2 = new Array(3); // 생성자 함수

            console.log(array1);
            console.log(array2);

            // 만약 이 언어가 자바였다면
            array1[0] = '당근';
            
            // 자바스크립트
            array1.push('사과');    // 제일 뒤에
            array1.unshift('망고'); // 제일 앞에
            array1.push('수박');
            array1.unshift('복숭아');

            const num = parseInt(Math.random() * array1.length);
            alert(`오늘의 점심 메뉴는 ${array1[num]} 입니다.`);

            alert(array1.pop());
            alert(array1.shift());

            document.querySelector('#area2').innerHTML = array1;
        }

    <div id="area3" class="area small"></div>
    <button onclick="holiday();">빨간날 찾기</button>

    <script>
        function holiday(){
            const days = ['노동절', '어린이날', '부처님오신날',
                          '크리스마스', '현충일', '삼일절', '식목일'];

            // 빨간날 찾아보기 버튼을 누르면
            // 사용자에게 텍스트를 입력받아서

            // 사용자가 입력한 텍스트가 배열의 요소일 경우
            // area3의 content에 xxx은(는) 빨간날이 맞습니다.
            // 입력한 텍스트가 요소가 아닐 경우
            // area3의 content에 xxx은(는) 빨간날이 아닙니다.
            const day = prompt('어떤날을 찾으시나요');
            // console.log(days.includes(day));
            // console.log(days.indexOf(day));

            const result = days.includes(day) ? '맞습니다.' : '아닙니다.';

            document.querySelector('#area3').innerHTML = 
            `${day}은(는) 빨간날이 ${result}`;
        };
    </script>

    <div id="area4" class="area small"></div>
    <button onclick="sort();">정렬</button>

    <script>
        function sort(){
            const arr = ['Banana', 'Lemon', 'Apple', '수박', '망고', '용과'];

            const area = document.querySelector('#area4');
            area.innerHTML = `${arr} <br>`;
            arr.sort();
            area.innerHTML += `${arr} <br>`;
            arr.reverse();
            area.innerHTML += `${arr} <br>`;

            // slice(begin, end) : 배열의 요소를 추출해줌
            area.innerHTML += `${arr.slice(1,4)} <br>`;
            area.innerHTML += `${arr.splice(1, 1, '수박박')} <br>`;
            area.innerHTML += `${arr} <br>`;
            area.innerHTML += `${arr.splice(3, 2)} <br>`;
            area.innerHTML += `${arr} <br>`;
        }
    </script>

    <h4>join() : 배열에 담긴 요소를 하나의 string타입으로 합쳐주는 메소드</h4>

    <div id="area5" class="area small"></div>
    <button onclick="join();">버튼</button>

    <script>
        function join(){

            const area = document.querySelector('#area5');

            const arr = ['홍길동', '고길동', '짱구', '도라에몽', '보노보노'];

            area.innerHTML = arr;
            const names = arr.map(function(name){
                return '이름 : ' + name + '<br>';
            });

            console.log(names);
            area.innerHTML = names.join("- ");

            const names2 = arr.map(n => `이름 : ${n}<br>`).join('');
            area.innerHTML = names2;

            const obj = {
                과일 : "사과"
            };

            area.innerHTML += obj;
        }
    </script>
