<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>변수 선언 위치에 따른 전역 / 지역변수</h4>

    <script>
        var str = 'var 전역변수';

        // window.onload = 현재 이 HTML 문서가 전부다 로딩되고 나서
        // 곧바로 실행할 이벤트 핸들러(익명함수)를 수행
        window.onload = function(){
            var str = 'var 지역변수';

            console.log(str);
            console.log(window.str);
            console.log(this.str); // this키워드가 항상 window객체를 가리키는 것은 아님
        }
        console.log(str);
    </script>

    <h3>* 자료형</h3>

    <pre>
        변수 선언 시 자료형을 별도로 선언하지 않음
        자료형의 개념이 없는 건 아님
        => 변수에 대입되는 값에 따라서 알아서 자료형을 결정함 : 타입추론
    </pre>

    <h4>자료형의 종류</h4>

    <ul>
        <li>string(문자열)</li>
        <li>number(숫자)</li>
        <li>boolean(논리)</li>
        <li>object(객체)</li>
        <li>function(함수)</li>
        <li>undefined(초기화가 안된 상태)</li>
    </ul>

    <div class="area" id="area"></div>
    <button onclick="printType();">자료형 출력해보기</button>

    <script>
        function printType(){
            const name = '홍길동';
            const age = 15;
            const isGoodThisf = true;
            const hobby = ['운동', '공부'];
            const family = {
                아빠 : "홍문",
                형 : "홍인형"
            };
            const call = function(){
                alert('아버지를 아버지라 못 부름');
            };

            let noVal;

            document.querySelector('#area');

            // console.log(area);
            /*
            area.innerHTML = name + '<br>';
            */

            area.innerHTML = `${name}<br>
                              ${age}<br>
                              ${isGoodThisf}<br>
                              ${hobby}<br>
                              ${family}<br>
                              ${call}<br>
                              ${noVal}<br><hr>`;
            
            area.innerHTML += `${typeof name}<br>
                               ${typeof age}<br>
                               ${typeof isGoodThisf}<br>
                               ${typeof hobby}<br>
                               ${typeof family}<br>
                               ${typeof call}<br>
                               ${typeof noVal}<br>`;
        }
    </script>

    <hr>

    <h3>string타입 메소드들</h3>

    <button onclick="stringMethod();">문자열 메소드 호출</button>
    
    <script>
        function stringMethod(){
            const str = "Hello world";

            console.log(`str : ${str}
                         문자열의 길이 : ${str.length}
                         toUpperCase : ${str.toUpperCase()}
                         toLowerCase : ${str.toLowerCase()}
                         indexOf : ${str.indexOf('l')}
                         lastIndexOf : ${str.lastIndexOf('l')}
                         substring : ${str.substring(3)}
                         substring : ${str.substring(0, 4)}
                         ${Math.random()}`);

            console.log('---------------------------------------------');

            console.log(7 + '7');
            console.log(7 + 7 + '7');
            // number가 string으로 형변환이 이루어져서 더하기 연산
            console.log(7 - '7');
            console.log(7 * '7');
            console.log(7 / '7');
            console.log('하' - 7);

            const price = '1,000';
            const salePrice = '700';

            console.log(price + salePrice);
            console.log(parseInt(salePrice) + parseInt(salePrice));
            console.log(Number(salePrice) + Number(salePrice));
            // parseFloat

            console.log(Number(price));
            console.log(parseFloat(price));
            console.log(isNaN('abc'));
            console.log(isNaN(123));
        }
    </script>
</body>
</html>
