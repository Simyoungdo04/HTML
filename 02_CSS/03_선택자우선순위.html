<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선택자 우선순위</title>
    <style>
        #id1{
            background-color: dodgerblue;
        }
        h1{
            color: white;
            background-color: black;
        }
        h1{
            color: yellow;
        }
        .class1{
            background-color: royalblue;
            color: aliceblue;
        }
        h1{
            color : greenyellow !important;
        }
    </style>
</head>
<body>
    <h1 id="id1" class="class1">선택자 우선 순위</h1>

    <pre>
        기본적으로 css는 스타일이 위에서부터 아래 순서로 반영
        동일한 선택자를 이용해서 스타일을 부여하면
        하단에 위치한 스타일속성이 적용
        다양한 선택자를 이용해서 스타일을 부여하면
        우선순위에 따라 적용

        인라인 스타일 방식
        ^
        아이디선택자
        ^
        클래스 선택자
        ^
        태그 선택자
    </pre>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
