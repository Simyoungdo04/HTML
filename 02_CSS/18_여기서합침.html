<!DOCTYPE html>
<html lang="en">
<head>
    <title>구조 실습</title>
    <style>
        div, header, nav, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        header{
            flex: 2;
            display: flex;
        }
        nav{
            flex: 0.5;
        }
        main{
            flex: 5.5;
            display: flex;
        }
        footer{
            flex: 2;
        }

        #header_1{
            flex: 2;
        }
        #header_2{
            flex: 6.5;
        }
        #header_3{
            flex: 1.5;
        }

        #content_1{
            flex: 1.5;
        }
        #content_2{
            padding: 24px 0px;
            flex: 6;
        }
        #content_3{
            flex: 2.5;
        }
    </style>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="searchform.css">
    <link rel="stylesheet" href="logo.css">
    <link rel="stylesheet" href="headerUtil.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="hero-banner.css">
</head>
<body>
    <!--
        실습 / 숙제
        나만의 웰컴 페이지 만들기

        HTML + CSS 파일을 다 만들고
        스크린샷 찍어서 우리반게시판에 올리기
    -->
    <div id="wrap">
        <header>
            <div id="header_1">
                <a href="#" id="logo">501 CLASS<span id="dot">.</span></a>
            </div>
            <div id="header_2">
                <form action="search" method="get" id="search-form">
                    <div id="search-text">
                        <input type="text" name="query" placeholder="검색어를 입력">
                    </div>
                    <div id="search-btn">
                        <button type="submit">검색하기</button>
                    </div>
                </form>
            </div>
            <div id="header_3">
                <div id="util">
                    <a href="#">회원가입</a>
                    <a href="#">로그인</a>
                    <a href="#">장바구니</a>
                </div>
            </div>
        </header>

        <nav>
            <ul id="navbar">
                <li><a href="#">단과반</a></li>
                <li><a href="#">자격증대비반</a></li>
                <li><a href="#">커뮤니티</a></li>
                <li><a href="#">문의하기</a></li>
                <li><a href="#">포트폴리오</a></li>
            </ul>
        </nav>

        <main>
            <div id="content_1"></div>
            <div id="content_2">
                <div id="hero">
                    <div id="hero-tag">New! 신상 강의</div>
                    <div id="hero-title">501강의실의 CSS구조잡기</div>
                    <div id="hero-sub">2026년 04월 한정</div>
                </div>
                <div id="lect"></div>
            </div>
            <div id="content_3"></div>
        </main>

        <footer>
            <div id="footer_1">
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
                <a href="#">인재 채용 문의</a>
                <a href="#">훈련비 게시</a>
                <a href="#">강사 구인</a>
            </div>
            <div id="footer_2">
                <p id="p_1">
                    종로 501 ｜ 대표자 : 심영도 ｜ 책임자 : 심영도 ｜  개인정보관리책임자 : 심영도
                </p>
                <p id="p_2">
                    Copyright ©2026 501 Class All Right Reserved
                </p>
            </div>
        </footer>

</body>
</html>
