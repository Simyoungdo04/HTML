<!DOCTYPE html>
<html lang="en">
<head>
    <title>구조잡기 연습</title>
    <style>
        div{
            border: 1px solid red;
            box-sizing: border-box;
        }

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
        }

        #warp > div{
            width: 100%;
        }

        #header, #footer{
            height: 200px;
            height: 25%;
        }

        #main{
            height: 400px;
            height: 50%;
        }
    </style>
</head>
<body>
    
    <div id="wrap">
        <div id="header"></div>
        <div id="main"></div>
        <div id="footer"></div>
    </div>

</body>
</html>
