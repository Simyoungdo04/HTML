<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img</title>
    <style>
        body{
            background-color: #1a1a1a;
        }
        #header_1{
            width: 180px;
            height: 140px;
        }
        div, a, img{
            border: 1px solid red;
            box-sizing: border-box;
        }

        /* -=-=-=-=-=-=-=-=-==- */

        #pixelCat{
            width: 128px;
            height: 128px;
        }
    </style>
</head>
<body>
    <div id="header_1">
        <a href="#">
            <img id="pixelCat" src="img/pixelCat.png" alt="pixelCat">
        </a>
    </div>
</body>
</html>
