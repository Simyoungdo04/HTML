<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #1a1a1a;
        }
        #content_2{
            border: 1px solid red;
            width: 840px;
            height: 460px;
        }

        #content_2{
            position: relative;
        }

        #title{
            color: #bebebe;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            padding-top: 80px;
        }

        #imgContent_1{
            border-top: 1px solid #5c5c5c;
            width: 840px;
            height: 330px;
            position: absolute;
            bottom: 0;

        }

        #imgContent_1>img{
            height: 150px;
            position: relative;
            top: 30px;
        }

        #ato_1{
            left: 5%;
        }

        #ato_doori{
            left: 10%;
        }

        #mungchi_1{
            left: 15%;
        }

        #mungchi_2{
            left: 20%;
        }


    </style>
</head>
<body>
    <div id="content_2">
        <div id="title">
            best 고양이
        </div>
        <div id="imgContent_1">
            <img id="ato_1" src="img/ato_1.jpg" alt="ato_1">
            <img id="ato_doori" src="img/ato_doori.jpg" alt="ato_doori">
            <img id="mungchi_1" src="img/mungchi_1.jpg" alt="mungchi_1">
            <img id="mungchi_2" src="img/mungchi_2.jpg" alt="mungchi_2">
        </div>
    </div>
</body>
</html>
