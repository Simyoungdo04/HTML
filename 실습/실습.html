<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <style>
        div, header, nav, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }

        body{
            background-color: #1a1a1a;
        }

        #wrap{
            width: 1200px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        header{
            flex: 2;
            display: flex;
        }
        #header_1{
            flex: 1.5;
        }
        #header_2{
            flex: 6.5; 
        }
        #header_3{
            flex: 2;
        }

        nav{
            flex: 0.5;
        }

        main{
            flex: 6.5;
            display: flex;
        }
        #content_1{
            flex: 1.5;
        }
        #content_2{
            flex: 7;
        }
        #content_3{
            flex: 1.5;
        }

        footer{
            flex: 2;
            display: flex;
        }
        #footer_logo{
            flex: 1;
        }
        #footer_wrap{
            flex: 9;
            display: flex;
        }
        #footer_1{
            flex: 1.5;
        }
        #footer_2{
            flex: 8.5;
        }
    </style>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="logo.css">
</head>

                        }

        <nav></nav>

            <div id="content_1"></div>
            <div id="content_2"></div>
            <div id="content_3"></div>
        </main>
        <footer>
            <div id="footer_logo">
                <a href="#">

                        {
                    </span>
                    Cat
                    <span id="close">
                        }
                    </span>
                </a>
            </div>
            <div id="footer_wrap">
                <div id="footer_1">
                    <p>© 2026 0DO</p>
                </div>
                <div id="footer_2">
                    <a href="#">이용약관</a>
