<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <style>
        div, header, nav, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }

        body{
            background-color: #1a1a1a;
        }

        #wrap{
            width: 1200px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        header{
            flex: 2;
            display: flex;
        }
        #header_1{
            flex: 1.5;
        }
        #header_2{
            flex: 7; 
        }
        #header_3{
            flex: 1.5;
        }

        nav{
            flex: 0.5;
        }

        main{
            flex: 6.5;
            display: flex;
        }
        #content_1{
            flex: 1.5;
        }
        #content_2{
            flex: 7;
        }
        #content_3{
            flex: 1.5;
        }

        footer{
            flex: 2;
        }
    </style>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="logo.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="pixelCat.css">
</head>
<body>
    <div id="wrap">
        <header>
            <div id="header_1">
                <a href="#">
                    <img id="pixelCat" src="img/pixelCat.png" alt="pixelCat">
                </a>
            </div>
            <div id="header_2">
                <a href="#" id="logo">
                    <span id="open">{</span>Cat<span id="close">}</span>
                </a>
            </div>
            <div id="header_3">
                <div id="signup">
                    <a href="#">회원가입</a>
                </div>
                <div id="login">
                    <button type="button">로그인</button>
                </div>
            </div>
        </header>
        <nav>
            <ul id="navbar">
                <li><a href="#">프로필</a></li>
                <li><a href="#">고양이 뉴스</a></li>
                <li><a href="#">커뮤니티</a></li>
                <li><a href="#">고양이 용품</a></li>
                <li><a href="#">고객센터</a></li>
            </ul>
        </nav>
        <main>
            <div id="content_1"></div>
            <div id="content_2"></div>
            <div id="content_3"></div>
        </main>
        <footer>
            <div id="footer_1">
                <a href="#">
                    <span id="open">{</span>Cat<span id="close">}</span>
                </a>
            </div>
            <div id="footer_2">
                <div id="footer_info">
                    <a href="#">이용약관</a>
                    <a href="#">개인정보처리방침</a>
                    <a href="#">문의하기</a>
                    <a href="#">도움</a>
                </div>
                <span id="footer_license">© 2026 0DO</span>
            </div>
        </footer>
    </div>
</body>
</html>
