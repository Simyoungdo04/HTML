<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 만들기</title>
</head>
<body>
    <!--
        <li> : 기본적인 목록을 만드는 태그
    -->
    우리 공부한 목록 :
    <li>JAVA</li>
    <li>SQL</li>
    <li>JDBC</li>
    <li>MyBatis</li>

    <h3>ul : 순서가 없는 목록을 사용할 떄 쓰는 태그</h3>

    <ul>
        <li>HTML</li>
            <ul>
                <li>1</li>
                <li>2</li>
            </ul>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>React</li>
    </ul>
    <!-- bullet기호 : 채워진원, 빈원, 네모, 내가 쓰고싶은 거 -->

    <h3>ol : 순서가 있는 목록을 사용할 때 쓰는 태그</h3>

    <ol start="3996" type="I">
        <li><img src="image/bigCat4.jpg" alt="" width="150"></li>
        <li>목록</li>
        <li>목록</li>
        <li>목록</li>
    </ol>

    <h3>dl : 설명적을 떄 쓰는 태그</h3>
    <dl>
        <dt>설명제목</dt>

        <dd>내용 1</dd>
        <dd>내용 2</dd>
        <dd>내용 3</dd>
    </dl>




    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
