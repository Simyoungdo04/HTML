<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2_표만들기</title>
    <style>
        table {
            border: 1px solid red;
        }
    </style>
</head>
<body> 
    <!--
        표(table) : row + cell로 구성됨
        많은 데이터를 정리해서 표현하고자 할 때 사용

        표를 구성하는 요소 : <table>, <tr>, <th>, <td>
                        + <thead>, <tbody>, <tfoot>

        table : 표를 하나 만들어주는 요소
        tr : 한 행을 나타내는 요소
        td : 일반 셀을 나타내는 요소
        th : 열의 제목셀을 나타내는 요소
    -->



    <table>
        <tr>
            <th colspan="2">제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>조회수</th>
            <th>좋아요</th>
        </tr>
        <tr>
            <td>123456798</td>
            <td>상품 name~~~~~</td>
            <td>이름</td>
            <td>12:22</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>321654978</td>
            <td>nanekasjlfkajlas</td>
            <td>efihfka</td>
            <td>12:12</td>
            <td>1000</td>
            <td>30</td>
        </tr>
        <tr>
            <td>718263498</td>
            <td>alskjdfl1234sdfa</td>
            <td>alalal</td>
            <td>01:01</td>
            <td>123</td>
            <td>321</td>
        </tr>
    </table>




    <br><br><br><br><br><br><br><br><br><br><!-- br*10 -->
</body>
</html>
