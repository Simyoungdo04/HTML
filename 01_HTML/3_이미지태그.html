    <p>
        *alt <br>
        - 사진의 경로가 존재하지 않거나 표현할 수 없을 때 대체 텍스트 <br>
        - 스크린리더에서 이미지를 읽어주는 설명문구 <br>

        웹접근성 => 사용자의 신체적, 지역, 나이, 지식 수준을 고려해 <br>
        가능한 최대한 많은 이용자가 불편함없이 이용할 수 있도록 구현하는 것
    </p>

    <hr>
    <h4>* width와 height 속성</h4>

    <p>
        요소의 가로, 세로길이 조절하는 속성 <br>
        고정길이(px), 가변길이(%)로 지정이 가능하다 <br>
    </p>

    <h4>기본단위 == px</h4>

         행 삭제 : Ctrl + X 잘라내기
    -->
