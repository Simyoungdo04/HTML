<!DOCTYPE html>
<html lang="en">
<head>
    <title>AJAX</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <h1>AJAX</h1>

    <pre>
        Asynchronous JavaScript And XML
    </pre>

    <!--
        시군명, 사업장명, 소재지도로명주소
    -->

    <div>
        <table class="table table-hover table-dark table-borderless">
            <thead>
                <tr>
                    <th width="300">지역</th>
                    <th width="300">카페명</th>
                    <th width="600">주소</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
    <hr>
    <button onclick="prev();" class="btn btn-lg btn-outline-secondary">이전</button>
    <button onclick="next();" class="btn btn-lg btn-outline-success">다음</button>

    <script>
        let page = 1;
        function next(){
            page++;
            requestCafe(page);
        };
        function prev(){
            if(page != 1){
                page--;
                requestCafe(page);
            }
            
        };

        $(function(){
            requestCafe();
        });

        function requestCafe(pageNo){
            if(!pageNo) pageNo = 1;
            $.ajax({
            url : 'https://openapi.gg.go.kr/Genrestrtcate?Type=json&pSize=10&KEY=3e16b568b9d640c08bad0c813040d8c5&pIndex=' + pageNo,
            dataType : 'json',
            success : result => {
                // console.log(result.Genrestrtcate[1].row);
                const cafes = result.Genrestrtcate[1].row;
                // console.log(cafes[0].BIZPLC_NM);
                // console.log(cafes[0].SIGUN_NM);
                // console.log(cafes[0].REFINE_ROADNM_ADDR)
                /*
                const name = cafes[0].BIZPLC_NM;
                const sigunName = cafes[0].SIGUN_NM;
                const address = cafes[0].REFINE_ROADNM_ADDR;

                const el = `<tr>
                                <td>${name}</td>
                                <td>${sigunName}</td>
                                <td>${address}</td>
                            </tr>`;
                */
                const el = cafes.map(e =>  `<tr>
                                                <td>${e.BIZPLC_NM}</td>
                                                <td>${e.SIGUN_NM}</td>
                                                <td>${e.REFINE_ROADNM_ADDR}</td>
                                            </tr>`)
                document.querySelector('tbody').innerHTML = el;
            }
        });
        }
    </script>

    <hr>

    <button type="button" id="show" class="btn btn-primary">Primary</button>
    <button type="button" id="hide" class="btn btn-secondary">Secondary</button>
    <button type="button" id="toggle" class="btn btn-success">Success</button>
    <button type="button" id="fadeIn" class="btn btn-danger">Danger</button>
    <button type="button" id="fadeOut" class="btn btn-warning">Warning</button>
    <button type="button" id="fadeToggle" class="btn btn-info">Info</button>
    <br>

    <img src="https://srv.carbonads.net/static/30242/00ce275be3fbc211ac297ca3fbf8c114998f69b6" alt="img1"
    width="250" id="img1">

    <script>
        $(function(){
            $('#hide').click(function(){
                $('#img1').hide(500);
            });
            $('#show').click(function(){
                $('#img1').show(500);
            });
            $('#toggle').click(function(){
                $('#img1').toggle(100);
            });

            $('#fadeOut').click(function(){
                $('#img1').fadeOut(2000);
            });
            $('#fadeIn').click(function(){
                $('#img1').fadeIn(2000);
            });
            $('#fadeToggle').click(function(){
                $('#img1').fadeToggle(1000);
            });
        });
    </script>

    <hr>

    <h4>* 글자수세기 예제</h4>

    <div style="border: 1px solid rgba(0, 0, 0, 0.2);">
        <br>
        40글자 이내로 입력하세요 <br>
        <hr>
        <textarea id="content" cols="40" rows="10" style="resize: none;" maxlength="40"></textarea>
        <hr><br>
        <span id="count">0</span>/40
        <br>
    </div>

    <script>
        $(function(){
            $('#content').keyup(e => {
                console.log(e.target.value.length);
                $('#count').html(e.target.value.length);
            });
        });
    </script>

    <hr>
    <button onclick="letsGo();">곤드레밥보기</button>
    <div style="padding:100px;" id="busan">


    </div>

    <script>
        let pageNo = 1;
        function letsGo(){
            $.ajax({
                url : 'https://apis.data.go.kr/6260000/FoodService/getFoodKr?serviceKey=0683a518f80264d6ed4fb9185d5731cc8000a640948615a332afcb56c55176b9&numOfRows=10&resultType=json&pageNo=' + pageNo++,
                dataType : 'json',
                success : e => {
                    // console.log(e.getFoodKr.item);
                    const items = e.getFoodKr.item;
                    console.log(items);
                    const el = items.map(e => `
                                                <div style="display:flex; width: 100%; height: 100%; margin-bottom:10px">
                                                    <div style="flex:2; padding:10px;">
                                                        <img src="${e.MAIN_IMG_NORMAL}"
                                                             width="100%"
                                                             height="100%"/>
                                                    </div>
                                                    <div style="flex:8; padding: 7px">
                                                        <h4>가게명 : ${e.MAIN_TITLE}</h4>
                                                        <p>대표메뉴 : ${e.RPRSNTV_MENU}</p>
                                                        <div>
                                                            ${e.ITEMCNTNTS}
                                                        </div>
                                                    </div>    
                                                </div>
                                              `).join('');
                    document.querySelector('#busan').innerHTML = el;
                }
            });
        };
    </script>

    <!--
        jQuery : 자바스크립트 라이브러리

        요소 선택 하는 법 $('CSS선택자')
        Content영역 변경하는 법 : html()
        style 변경하는 법 : css()
        EventHandler 다는 법(click) : click()
        Input 요소 value 속성 접근하는 법 : val()
    -->

</body>
